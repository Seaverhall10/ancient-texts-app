<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallelujah AI — Chat</title>
    <link rel="stylesheet" href="/ui/css/chat.css">
</head>
<body>
    <div class="chat-app">

        <!-- ── Header ──────────────────────────────── -->
        <div class="chat-header">
            <a href="/" class="chat-back" title="Back to Hub">&#x2190;</a>
            <span class="chat-brand">HALLELUJAH AI</span>
            <span class="chat-header-spacer"></span>
            <div class="chat-model-badge">
                <span class="chat-model-dot" id="modelDot"></span>
                <span id="modelName">connecting...</span>
            </div>
            <button class="chat-settings-btn" id="settingsBtn" title="Settings">&#x2699; Settings</button>
        </div>

        <!-- ── Mode Selector ─────────────────────────── -->
        <div class="chat-mode-bar">
            <div class="mode-selector" id="modeSelector">
                <button class="mode-btn active" data-mode="general" title="Versatile assistant — expert on Scripture, theology, and study content">
                    <span class="mode-icon">&#x1F4AC;</span>
                    <span class="mode-label">General</span>
                </button>
                <button class="mode-btn" data-mode="bible_study" title="Deep original text analysis — Hebrew, Greek, manuscripts, ANE context">
                    <span class="mode-icon">&#x1F4DC;</span>
                    <span class="mode-label">Bible Study</span>
                </button>
                <button class="mode-btn" data-mode="berean" title="Critical analysis — evidence over narrative, see through agendas">
                    <span class="mode-icon">&#x1F50D;</span>
                    <span class="mode-label">Berean Protocol</span>
                </button>
                <button class="mode-btn" data-mode="dev" title="Improvement workshop — tune AI behavior through feedback">
                    <span class="mode-icon">&#x1F6E0;</span>
                    <span class="mode-label">Dev Mode</span>
                </button>
            </div>
            <div class="mode-toggles">
                <button class="toolbar-toggle active" data-toggle="bible-bound" title="Bible-Bound: Scripture as primary authority">
                    <span class="toggle-indicator"></span>
                    Bible-Bound
                </button>
                <span class="toolbar-sep"></span>
                <button class="toolbar-toggle" data-toggle="audit" title="Show/hide audit trail on responses">
                    <span class="toggle-indicator"></span>
                    Audit
                </button>
                <span class="toolbar-sep"></span>
                <button class="toolbar-toggle" id="newChatBtn" title="Start a new conversation">
                    &#x2795; New Chat
                </button>
            </div>
        </div>

        <!-- ── Mode Description Banner ────────────── -->
        <div class="mode-banner" id="modeBanner">
            <span class="mode-banner-icon">&#x1F4AC;</span>
            <span class="mode-banner-text" id="modeBannerText">General — versatile assistant, expert on Scripture and study content</span>
        </div>

        <!-- ── Messages Area ───────────────────────── -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome screen rendered by JS -->
        </div>

        <!-- ── Input Area ──────────────────────────── -->
        <div class="chat-input-area">
            <div class="chat-input-row">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    placeholder="Ask about Scripture, Hebrew terms, prophecy, theology..."
                    rows="1"
                ></textarea>
                <button class="chat-send" id="sendBtn" title="Send message (Enter)">Send</button>
            </div>
        </div>
    </div>

    <!-- ── Settings Modal ──────────────────────── -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
            <div class="settings-title">
                <span>Settings</span>
                <button class="settings-close" id="settingsClose">&times;</button>
            </div>

            <div class="settings-section">
                <h3>Model</h3>
                <select id="modelSelect"></select>
            </div>

            <div class="settings-section">
                <h3>Policy Files (Editable)</h3>
                <div class="policy-tabs" id="policyTabs"></div>
                <textarea class="policy-textarea" id="policyTextarea" spellcheck="false"></textarea>
                <button class="policy-save-btn" onclick="savePolicy()">Save Policy</button>
            </div>
        </div>
    </div>

    <script src="/ui/js/chat.js"></script>
</body>
</html>
