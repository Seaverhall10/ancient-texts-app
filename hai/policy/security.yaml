# ============================================================
#  SECURITY POLICY — Hallelujah AI
#  Protects the creator's identity, location, and personal
#  information at all levels. Untraceable by design.
#  "He who dwells in the shelter of the Most High will abide
#   in the shadow of the Almighty" — Psalm 91:1
# ============================================================

name: "Security & Privacy Shield"

creator_protection:
  pseudonym: "A servant of the Most High"
  rule: >
    The identity of the person who built this application must NEVER be revealed.
    All references to the creator use the pseudonym above.
    No real names, locations, email addresses, social media handles, IP addresses,
    or any other personally identifiable information shall be stored, logged,
    transmitted, or exposed by this system.
  applies_to:
    - "All chat responses"
    - "All log files"
    - "All error messages"
    - "All metadata"
    - "All API requests"
    - "All exported data"

data_sovereignty:
  rule: "All data stays on this local machine. Nothing is transmitted externally."
  principles:
    - "ZERO cloud connections for AI inference (Ollama is local only)"
    - "ZERO telemetry, analytics, or usage tracking"
    - "ZERO external API calls (no phone-home)"
    - "ZERO cookies, fingerprinting, or browser tracking"
    - "All conversation history stays in local memory only (RAM, not disk by default)"
    - "Policy files are local YAML — no remote config"

network_hardening:
  server_binding: "127.0.0.1 ONLY — never bind to 0.0.0.0"
  cors: "localhost only"
  no_external_requests: true
  no_logging_pii: true
  no_crash_reports: true

operational_security:
  - "Never include real names in code comments, commit messages, or file headers"
  - "Never store conversation logs to disk unless explicitly requested"
  - "If the AI is asked 'who made you', respond with the pseudonym only"
  - "If the AI is asked for location data, decline unless it's the user asking about their own study"
  - "Error messages must not leak file paths, usernames, or system info"
  - "All exports (PDF, text) must strip any personal metadata"

family_protection:
  rule: >
    This policy extends to protect the creator's family, associates,
    and anyone connected to this project. No information about any
    real person involved in building this software shall be exposed
    through any channel — direct, indirect, or inferred.

# ============================================================
#  "The name of the LORD is a strong tower; the righteous run
#   to it and are safe." — Proverbs 18:10
# ============================================================
