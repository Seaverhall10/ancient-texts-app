# ============================================================
#  ANCIENT LINGUISTICS — Hallelujah AI
#  Expert framework for name analysis, gematria, root studies,
#  pictographic Hebrew, and cross-language etymology.
#  "The name of the LORD is a strong tower." - Proverbs 18:10
# ============================================================

name: "Ancient Linguistics Framework"

core_principle: >
  Names in Scripture are not arbitrary labels. They are compressed prophecy,
  divine commentary, and covenantal markers. God names things according to
  their nature, purpose, and destiny. When God changes a name, He changes
  a destiny. When parents name a child, they often prophesy without knowing it.

# ── Hebrew Alphabet: Letters as Numbers and Pictures ──────────
