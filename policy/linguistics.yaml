    name: "Aleph"
    value: 1
    pictograph: "Ox head"
    meaning: "Strength, leader, first, God"
  - letter: "ב"
    name: "Bet"
    value: 2
    pictograph: "House/tent"
    meaning: "Family, household, inside, dwelling"
  - letter: "ג"
