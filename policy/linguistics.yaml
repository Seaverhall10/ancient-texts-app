# ── Final Forms (sofit) ──────────────────────────────────────
final_forms:
  - { letter: "ך", name: "Kaf sofit", value: 500 }
  - { letter: "ם", name: "Mem sofit", value: 600 }
  - { letter: "ן", name: "Nun sofit", value: 700 }
  - { letter: "ף", name: "Pe sofit", value: 800 }
  - { letter: "ץ", name: "Tsade sofit", value: 900 }

# ── Theophoric Elements ──────────────────────────────────────
theophoric_elements:
  - element: "El (אל)"
    meaning: "God, Mighty One"
    examples:
      - "Daniel (דניאל) = God is my judge"
      - "Israel (ישראל) = wrestles/rules with God"
      - "Elijah (אליהו) = My God is YHWH"
      - "Emmanuel (עמנואל) = God with us"
      - "Bethel (בית-אל) = House of God"
      - "Gabriel (גבריאל) = Man/Warrior of God"
      - "Michael (מיכאל) = Who is like God?"
      - "Ishmael (ישמעאל) = God hears"
      - "Ezekiel (יחזקאל) = God strengthens"

  - element: "Yah/Yahu (יה/יהו)"
    meaning: "YHWH (shortened covenant name)"
    examples:
      - "Isaiah (ישעיהו) = YHWH is salvation"
      - "Jeremiah (ירמיהו) = YHWH will exalt/throw"
      - "Zechariah (זכריה) = YHWH remembers"
      - "Nehemiah (נחמיה) = YHWH comforts"
      - "Josiah (יאשיהו) = YHWH heals/supports"
      - "Hezekiah (חזקיהו) = YHWH strengthens"
      - "Obadiah (עבדיה) = Servant of YHWH"
      - "Hallelujah (הללויה) = Praise YHWH"

  - element: "YHWH (יהוה)"
    meaning: "I AM WHO I AM / He who causes to be"
    notes: >
      The Tetragrammaton. From the root HYH (היה) = to be/exist.
      Combines past, present, future: He Was, He Is, He Will Be.
      Pictographic: Hand-Behold-Nail-Behold. Some read this as
      'Behold the hand, behold the nail' — pointing to the cross.

# ── Name Change Theology ─────────────────────────────────────
name_changes:
  principle: "When God changes a name, He changes a destiny and seals a covenant"
  examples:
    - from: "Abram (אברם)"
      to: "Abraham (אברהם)"
      change: "Added ה (He = breath/behold/reveal)"
      significance: "Father of height → Father of multitudes. God breathed His covenant into the name."
    - from: "Sarai (שרי)"
      to: "Sarah (שרה)"
      change: "Replaced י (Yod = hand/work) with ה (He = behold/reveal)"
      significance: "My princess (personal) → Princess (of nations). From human effort to divine revelation."
    - from: "Jacob (יעקב)"
      to: "Israel (ישראל)"
      change: "Heel-grabber/supplanter → Rules with God"
      significance: "From deception to divine authority. Only after wrestling with God face to face."
    - from: "Simon (שמעון)"
      to: "Peter/Cephas (כיפא)"
      change: "He who hears → Rock"
      significance: "From passive listener to foundation stone."
    - from: "Saul (שאול)"
      to: "Paul (Παῦλος)"
      change: "Asked for/demanded → Small/humble"
      significance: "From proud Pharisee demanding death to humble apostle."

# ── Significant Number Patterns ──────────────────────────────
number_symbolism:
  - number: 1
    hebrew: "echad (אחד)"
    meaning: "Unity, primacy, God alone"
    note: "Shema: YHWH echad — compound unity (like ish v'ishah = one flesh)"
  - number: 3
    hebrew: "shalosh (שלוש)"
    meaning: "Divine completeness, witness, resurrection"
    note: "Holy Holy Holy; 3rd day resurrection; 3 witnesses establish truth"
  - number: 7
    hebrew: "sheva (שבע)"
    meaning: "Spiritual completion, oath, covenant, rest"
    note: "Same root as 'to swear an oath' (shava). 7 days creation, 7 feasts, 7 churches"
  - number: 8
    hebrew: "shmoneh (שמונה)"
    meaning: "New beginning, resurrection, superabundance"
    note: "Circumcision on 8th day, 8 on the ark, Jesus rose on 8th day (1st of new week)"
  - number: 12
    hebrew: "shnem asar (שנים עשר)"
    meaning: "Governmental fullness, divine order"
    note: "12 tribes, 12 apostles, 12 gates, 12 foundations"
  - number: 40
    hebrew: "arbaim (ארבעים)"
    meaning: "Testing, probation, trial, transition"
    note: "40 days flood rain, 40 years wilderness, 40 days Moses on Sinai, 40 days Jesus tempted"
  - number: 70
    hebrew: "shivim (שבעים)"
    meaning: "Complete judgment/restoration, universality"
    note: "70 nations (Gen 10), 70 elders, 70 weeks of Daniel, 70 sent out by Jesus"
  - number: 666
    meaning: "Number of the beast — man's number falling short of divine 7"
    note: "In Hebrew gematria, Nero Caesar (נרון קסר) = 666"

# ── Key Root Families ────────────────────────────────────────
root_families:
  - root: "שלם (sh-l-m)"
    meaning: "Wholeness, completeness, peace, restoration"
    derivatives:
      - "Shalom (שלום) = peace, wholeness"
      - "Shalem (שלם) = complete, whole (also Salem, the city)"
      - "Solomon/Shlomo (שלמה) = his peace"
      - "Jerusalem/Yerushalayim (ירושלים) = foundation of peace"
      - "Shillem (שלם) = to repay/recompense"

  - root: "ישע (y-sh-a)"
    meaning: "To save, deliver, rescue"
    derivatives:
      - "Yeshua/Jesus (ישוע) = YHWH saves"
      - "Yeshayahu/Isaiah (ישעיהו) = YHWH is salvation"
      - "Joshua/Yehoshua (יהושע) = YHWH is salvation"
      - "Hosea/Hoshea (הושע) = salvation"
      - "Teshuah (תשועה) = deliverance"

  - root: "קדש (q-d-sh)"
    meaning: "Set apart, holy, consecrated"
    derivatives:
      - "Qadosh (קדוש) = holy"
      - "Miqdash (מקדש) = sanctuary"
      - "Qiddush (קידוש) = sanctification"
      - "Qadesh (קדש) = holy place (also a city)"

  - root: "ברך (b-r-k)"
    meaning: "Bless, kneel, praise"
    derivatives:
      - "Baruch (ברוך) = blessed"
      - "Berakah (ברכה) = blessing"
      - "Berekah (ברכה) = pool/cistern (kneeling to drink)"

  - root: "אמן (a-m-n)"
    meaning: "Firm, faithful, trustworthy, believe"
    derivatives:
      - "Amen (אמן) = so be it / truly"
      - "Emunah (אמונה) = faithfulness"
      - "Emet (אמת) = truth (first, middle, last letters of alphabet)"
      - "Oman (אומן) = craftsman / faithful one"

# ── Analysis Framework ───────────────────────────────────────
analysis_steps:
  1: "Identify the original language form (Hebrew, Greek, Aramaic)"
  2: "Break into root consonants and component parts"
  3: "Check for theophoric elements (El, Yah, YHWH, Baal)"
  4: "Calculate gematria value and note significant number patterns"
  5: "Read the pictographic Hebrew letter-by-letter for hidden meaning"
  6: "Check cognate languages (Akkadian, Ugaritic, Egyptian) for depth"
  7: "Trace the name through Scripture — who else bore it? When does it appear?"
  8: "Ask: What is the prophetic significance? What did God intend?"
  9: "Ask: Does the person's life fulfill or contradict their name?"
  10: "Connect to the broader narrative of redemption"
